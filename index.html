<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>AI Portfolio</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0b1220;
      color: #e5e7eb;
      margin: 0;
      padding: 40px;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
      font-size: 2rem;
    }

    #repos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
    }

    .card {
      background: #111827;
      padding: 20px;
      border-radius: 16px;
      border: 1px solid #1f2937;
      transition: all 0.25s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: #38bdf8;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 1.1rem;
      color: #f9fafb;
    }

    .desc {
      font-size: 0.9rem;
      color: #9ca3af;
      margin-bottom: 15px;
      line-height: 1.4;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      margin-bottom: 15px;
      color: #cbd5f5;
    }

    .badge {
      background: #1f2937;
      padding: 4px 10px;
      border-radius: 999px;
    }

    a {
      display: inline-block;
      margin-top: 10px;
      color: #38bdf8;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
    }

    a:hover {
      opacity: 0.8;
    }

    /* 🔥 TOP 3 destaque */
    .top {
      border: 1px solid #facc15;
      background: linear-gradient(135deg, #1e293b, #020617);
      box-shadow: 0 10px 30px rgba(250, 204, 21, 0.2);
    }

    .top h3 {
      color: #facc15;
    }
  </style>
</head>

<body>

  <h1>🚀 Meu Portfólio com IA</h1>

  <div id="repos"></div>

  <script src="app.js"></script>

</body>
</html>
